name: CI Test

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.24"
      - name: Run unit tests
        run: go test -short -v ./...

  integration:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        pg-version: ["14", "15", "16", "17", "18"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.24"
      - name: Run integration tests (PG ${{ matrix.pg-version }})
        env:
          PGSCHEMA_POSTGRES_VERSION: ${{ matrix.pg-version }}
        run: go test -v ./...
